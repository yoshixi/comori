<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

  <!-- Background: warm cream, same palette as the original icon -->
  <rect width="1024" height="1024" rx="224" fill="#EDE8DC"/>

  <!-- Book drop shadow -->
  <rect x="166" y="290" width="700" height="462" rx="10" fill="#1C1C1C" opacity="0.10"/>

  <!-- Left page (rounded left corners, square right edge) -->
  <path d="M172,282 L500,282 L500,742 L172,742 Q162,742 162,732 L162,292 Q162,282 172,282 Z" fill="#F8F5EE"/>

  <!-- Right page (square left edge, rounded right corners) -->
  <path d="M522,282 L852,282 Q862,282 862,292 L862,732 Q862,742 852,742 L522,742 Z" fill="#F8F5EE"/>

  <!-- Spine -->
  <rect x="500" y="282" width="22" height="460" fill="#1C1C1C"/>
  <!-- Spine inner highlight (subtle fold) -->
  <line x1="521" y1="284" x2="521" y2="740" stroke="#FFFFFF" stroke-width="1.5" opacity="0.12"/>

  <!-- ======================================= -->
  <!-- LEFT PAGE: Daily journal / notes        -->
  <!-- ======================================= -->

  <!-- Date pill at top of left page -->
  <rect x="188" y="300" width="120" height="28" rx="4" fill="#1C1C1C" opacity="0.08"/>
  <line x1="198" y1="309" x2="292" y2="309" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="198" y1="320" x2="258" y2="320" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round" opacity="0.30"/>

  <!-- Separator below date header -->
  <line x1="188" y1="340" x2="476" y2="340" stroke="#1C1C1C" stroke-width="1.5" opacity="0.40"/>

  <!-- Ruled lines (base, light) -->
  <line x1="188" y1="378" x2="476" y2="378" stroke="#1C1C1C" stroke-width="1.5" opacity="0.18"/>
  <line x1="188" y1="422" x2="476" y2="422" stroke="#1C1C1C" stroke-width="1.5" opacity="0.18"/>
  <line x1="188" y1="466" x2="476" y2="466" stroke="#1C1C1C" stroke-width="1.5" opacity="0.18"/>
  <line x1="188" y1="510" x2="476" y2="510" stroke="#1C1C1C" stroke-width="1.5" opacity="0.18"/>
  <line x1="188" y1="554" x2="476" y2="554" stroke="#1C1C1C" stroke-width="1.5" opacity="0.18"/>
  <line x1="188" y1="598" x2="476" y2="598" stroke="#1C1C1C" stroke-width="1.5" opacity="0.18"/>
  <line x1="188" y1="642" x2="476" y2="642" stroke="#1C1C1C" stroke-width="1.5" opacity="0.18"/>
  <line x1="188" y1="686" x2="476" y2="686" stroke="#1C1C1C" stroke-width="1.5" opacity="0.18"/>
  <line x1="188" y1="722" x2="476" y2="722" stroke="#1C1C1C" stroke-width="1.5" opacity="0.18"/>

  <!-- Ink marks on the first four lines (written entries) -->
  <line x1="188" y1="378" x2="400" y2="378" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="188" y1="422" x2="352" y2="422" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="188" y1="466" x2="432" y2="466" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="188" y1="510" x2="296" y2="510" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

  <!-- ======================================= -->
  <!-- RIGHT PAGE: Monthly calendar view       -->
  <!-- ======================================= -->
  <!-- Right page center x = (522+862)/2 = 692 -->

  <!-- Month label placeholder (two centered lines) -->
  <line x1="642" y1="308" x2="742" y2="308" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.50"/>
  <line x1="660" y1="322" x2="724" y2="322" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.30"/>

  <!-- Separator below month header -->
  <line x1="546" y1="344" x2="838" y2="344" stroke="#1C1C1C" stroke-width="1.5" opacity="0.25"/>

  <!-- Day-of-week header: 7 short horizontal marks -->
  <!-- Column centers: 567, 609, 650, 692, 734, 775, 817 -->
  <line x1="557" y1="366" x2="577" y2="366" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="599" y1="366" x2="619" y2="366" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="640" y1="366" x2="660" y2="366" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="682" y1="366" x2="702" y2="366" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="724" y1="366" x2="744" y2="366" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="765" y1="366" x2="785" y2="366" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="807" y1="366" x2="827" y2="366" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round" opacity="0.35"/>

  <!-- Separator below day headers -->
  <line x1="546" y1="382" x2="838" y2="382" stroke="#1C1C1C" stroke-width="1" opacity="0.15"/>

  <!-- Calendar grid: 5 rows × 7 columns -->
  <!-- Row centers: 430, 494, 559, 623, 688 -->
  <!-- Col centers: 567, 609, 650, 692, 734, 775, 817 -->
  <!-- Circle radius: 16 -->

  <!-- Row 0: month starts on Tuesday (col 1) -->
  <circle cx="609" cy="430" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="650" cy="430" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="692" cy="430" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="734" cy="430" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="775" cy="430" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="817" cy="430" r="16" fill="#1C1C1C" opacity="0.08"/>

  <!-- Row 1 -->
  <circle cx="567" cy="494" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="609" cy="494" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="650" cy="494" r="16" fill="#1C1C1C" opacity="0.08"/>
  <!-- TODAY: highlighted cell -->
  <circle cx="692" cy="494" r="19" fill="#1C1C1C"/>
  <circle cx="734" cy="494" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="775" cy="494" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="817" cy="494" r="16" fill="#1C1C1C" opacity="0.08"/>

  <!-- Row 2 -->
  <circle cx="567" cy="559" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="609" cy="559" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="650" cy="559" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="692" cy="559" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="734" cy="559" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="775" cy="559" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="817" cy="559" r="16" fill="#1C1C1C" opacity="0.08"/>

  <!-- Row 3 -->
  <circle cx="567" cy="623" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="609" cy="623" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="650" cy="623" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="692" cy="623" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="734" cy="623" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="775" cy="623" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="817" cy="623" r="16" fill="#1C1C1C" opacity="0.08"/>

  <!-- Row 4: end of month (partial row) -->
  <circle cx="567" cy="688" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="609" cy="688" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="650" cy="688" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="692" cy="688" r="16" fill="#1C1C1C" opacity="0.08"/>
  <circle cx="734" cy="688" r="16" fill="#1C1C1C" opacity="0.08"/>

</svg>
